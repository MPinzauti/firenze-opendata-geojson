name: Update OpenData GeoJSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # ogni 6 ore
  push:
    paths:
      - "sources.json"
      - ".github/workflows/update-data.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin

      - name: Generate GeoJSON
        run: |
          mkdir -p tmp docs

          python3 - <<'PY'
          import json, os, subprocess, urllib.request, datetime

          with open("sources.json", "r", encoding="utf-8") as f:
              cfg = json.load(f)

          out_manifest = {
              "generatedAt": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "datasets": []
          }

          for ds in cfg["datasets"]:
              kml_url = ds.get("kml_url", "").strip()
              out_name = ds.get("output", "").strip()
              ds_id = ds.get("id")

              if not kml_url:
                  print(f"SKIP {ds_id}: missing kml_url")
                  continue

              kml_path = os.path.join("tmp", f"{ds_id}.kml")
              out_path = os.path.join("docs", out_name)

              print(f"Downloading {ds_id} -> {kml_path}")
              urllib.request.urlretrieve(kml_url, kml_path)

              print(f"Converting {kml_path} -> {out_path}")
              subprocess.check_call([
                  "ogr2ogr",
                  "-f", "GeoJSON",
                  out_path,
                  kml_path
              ])

              out_manifest["datasets"].append({
                  "id": ds_id,
                  "name": ds.get("name", ds_id),
                  "url": out_name
              })

          with open(os.path.join("docs", "datasets.json"), "w", encoding="utf-8") as f:
              json.dump(out_manifest, f, ensure_ascii=False, indent=2)

          print("Done.")
          PY

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/*.geojson docs/datasets.json || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update datasets"
            git push
          fi
